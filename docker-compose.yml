version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: neurax_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: neurax_admin
      POSTGRES_PASSWORD: neurax_dev_password
      POSTGRES_DB: neurax_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurax_admin -d neurax_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: neurax_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
