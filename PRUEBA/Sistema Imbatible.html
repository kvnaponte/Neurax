<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sistema Imbatible — Mobile App Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cinzel:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; }
  body {
    background: radial-gradient(ellipse at 50% 0%, #1a0d3d 0%, #07061a 50%, #04050f 100%);
    font-family: 'Inter', system-ui, sans-serif;
    color: #f5f3ff;
    overflow: hidden;
  }
  #root { display: flex; align-items: center; justify-content: center; }
  /* hide scrollbars inside the phone */
  ::-webkit-scrollbar { width: 0; height: 0; display: none; }
  * { scrollbar-width: none; }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  @keyframes xpFloat {
    0%   { transform: translate(-50%, 0) scale(0.6); opacity: 0; }
    20%  { transform: translate(-50%, -10px) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -100px) scale(1); opacity: 0; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes popIn {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes rayPulse {
    0%, 100% { opacity: 0.05; }
    50%      { opacity: 0.25; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Phone shell wrapper -->
  <script type="text/babel">
    // Centered phone shell — fixed mobile canvas regardless of viewport.
    const PHONE_W = 380;
    const PHONE_H = 800;
    function PhoneShell({ children }) {
      const [scale, setScale] = React.useState(1);
      React.useEffect(() => {
        function fit() {
          const sw = window.innerWidth, sh = window.innerHeight;
          const margin = 40;
          const s = Math.min((sw - margin) / PHONE_W, (sh - margin) / PHONE_H, 1.1);
          setScale(s);
        }
        fit();
        window.addEventListener('resize', fit);
        return () => window.removeEventListener('resize', fit);
      }, []);
      return (
        <div data-screen-label="Imbatible Phone" style={{
          width: PHONE_W, height: PHONE_H,
          transform: `scale(${scale})`, transformOrigin: 'center center',
          position: 'relative',
          borderRadius: 44, overflow: 'hidden',
          background: '#04050f',
          boxShadow: '0 40px 80px rgba(0,0,0,0.6), 0 0 0 10px #0c0f1f, 0 0 0 11px rgba(168,132,251,0.25), 0 0 60px rgba(168,85,247,0.2)',
        }}>
          {/* status bar (Android) */}
          <div style={{
            position: 'absolute', top: 0, left: 0, right: 0, height: 36,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '0 18px', zIndex: 9,
            color: '#fff', fontSize: 13, fontWeight: 600,
            pointerEvents: 'none',
          }}>
            <div>9:41</div>
            <div style={{ position: 'absolute', left: '50%', top: 8, transform: 'translateX(-50%)', width: 22, height: 22, borderRadius: '50%', background: '#0c0f1f', border: '1px solid #1a1c3a' }} />
            <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
              <svg width="14" height="10" viewBox="0 0 14 10"><path fill="#fff" d="M0 8h2v2H0zM4 6h2v4H4zM8 3h2v7H8zM12 0h2v10h-2z" /></svg>
              <svg width="14" height="10" viewBox="0 0 14 10"><path fill="#fff" d="M7 1.4a8 8 0 015.6 2.3l-1 1a6.6 6.6 0 00-9.2 0l-1-1A8 8 0 017 1.4zm0 2.6a5.4 5.4 0 013.8 1.6l-1 1a4 4 0 00-5.6 0l-1-1A5.4 5.4 0 017 4zm0 2.7a2.7 2.7 0 011.9.8L7 9.8 5.1 7.5A2.7 2.7 0 017 6.7z" /></svg>
              <div style={{ width: 22, height: 10, border: '1px solid #fff', borderRadius: 2, padding: 1, position: 'relative' }}>
                <div style={{ width: '70%', height: '100%', background: '#fff', borderRadius: 1 }} />
                <div style={{ position: 'absolute', right: -3, top: 2, width: 2, height: 4, background: '#fff', borderRadius: 1 }} />
              </div>
            </div>
          </div>
          <div style={{ position: 'absolute', top: 36, left: 0, right: 0, bottom: 0 }}>{children}</div>
        </div>
      );
    }
    window.PhoneShell = PhoneShell;
  </script>

  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/screen-onboarding.jsx"></script>
  <script type="text/babel" src="app/screen-login.jsx"></script>
  <script type="text/babel" src="app/screen-dashboard.jsx"></script>
  <script type="text/babel" src="app/screen-activities.jsx"></script>
  <script type="text/babel" src="app/screen-stats.jsx"></script>
  <script type="text/babel" src="app/screen-achievements.jsx"></script>
  <script type="text/babel" src="app/screen-levels.jsx"></script>
  <script type="text/babel" src="app/screen-profile.jsx"></script>
  <script type="text/babel" src="app/screen-register.jsx"></script>
  <script type="text/babel" src="app/screen-levelup.jsx"></script>
  <script type="text/babel" src="app/bottom-nav.jsx"></script>

  <script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
