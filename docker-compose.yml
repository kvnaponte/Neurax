services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: neurax_dev
      POSTGRES_USER: neurax
      POSTGRES_PASSWORD: neurax_dev_pass
    ports:
      - "5434:5432"
    volumes:
      - neurax_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurax -d neurax_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: neurax_minio_key
      MINIO_ROOT_PASSWORD: neurax_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  neurax_pg_data:
  redis_data:
  minio_data:
